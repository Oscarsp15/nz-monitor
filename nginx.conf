# Reverse proxy: sirve el frontend y enruta /api y /health al backend FastAPI.
events {}
http {
  upstream backend  { server backend:8000; }
  upstream frontend { server frontend:80; }

  server {
    listen 80;

    # API y healthcheck → backend
    location /api/    { proxy_pass http://backend; proxy_set_header Host $host; }
    location /health  { proxy_pass http://backend; proxy_set_header Host $host; }

    # SSE (Fase 4): sin buffering para streaming
    location /api/stream {
      proxy_pass http://backend;
      proxy_set_header Connection '';
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 1h;
    }

    # Todo lo demás → frontend (SPA)
    location / { proxy_pass http://frontend; proxy_set_header Host $host; }
  }
}

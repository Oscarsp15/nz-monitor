# Uso:
#   docker compose up --build                  -> backend + collector + frontend + nginx
#   docker compose --profile scale up --build  -> + redis (solo al escalar)
services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - APP_ROLE=api          # la API NO arranca el recolector
    volumes:
      - ./backend/data:/app/data
    depends_on: [collector]
    expose: ["8000"]

  collector:
    build: ./backend
    env_file: .env
    environment:
      - APP_ROLE=collector    # proceso ÚNICO del recolector (APScheduler)
    command: ["python", "-m", "collector"]
    volumes:
      - ./backend/data:/app/data   # comparte el SQLite con la API
    # IMPORTANTE: una sola réplica. Nunca escalar este servicio.
    deploy:
      replicas: 1

  frontend:
    build: ./frontend
    expose: ["80"]

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["8080:80"]
    depends_on: [backend, frontend]

  # ─── Opcional: solo con --profile scale ───
  redis:
    image: redis:7-alpine
    profiles: ["scale"]
    ports: ["6379:6379"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # caché efímero
